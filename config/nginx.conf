events {
    worker_connections 1024;
}

http {
    upstream device_api {
        server device-01:8080 max_fails=3 fail_timeout=30s;
        server device-02:8080 max_fails=3 fail_timeout=30s;
    }

    upstream device_vnc {
        server device-01:6080;
        server device-02:6080;
    }

    server {
        listen 80;

        # API proxy
        location /api/ {
            proxy_pass http://device_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # noVNC proxy
        location /vnc/ {
            proxy_pass http://device_vnc/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Health dashboard
        location /health {
            proxy_pass http://device_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            # Simple status page
            return 200 'Cloud Android Runner — ${status} OK\n';
            add_header Content-Type text/plain;
        }
    }
}
